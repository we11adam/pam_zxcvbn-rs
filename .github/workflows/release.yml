name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  LIB_NAME: libpam_zxcvbn.so
  RELEASE_LIB_NAME: pam_zxcvbn.so
  GLIBC_BASELINE: "2.17"
  DIST_DIR: dist

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            image: quay.io/pypa/manylinux2014_x86_64
            asset_name: pam_zxcvbn-linux-glibc217-amd64
          - arch: arm64
            platform: linux/arm64
            image: quay.io/pypa/manylinux2014_aarch64
            asset_name: pam_zxcvbn-linux-glibc217-arm64

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set Up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Release Asset
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          CONTAINER_IMAGE: ${{ matrix.image }}
          CONTAINER_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail

          mkdir -p "${DIST_DIR}"

          docker run --rm \
            --platform "${CONTAINER_PLATFORM}" \
            -e ASSET_NAME="${ASSET_NAME}" \
            -e DIST_DIR="${DIST_DIR}" \
            -e LIB_NAME="${LIB_NAME}" \
            -e RELEASE_LIB_NAME="${RELEASE_LIB_NAME}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${PWD}:/work" \
            -w /work \
            "${CONTAINER_IMAGE}" \
            bash -lc '
              set -euo pipefail
              export MANPATH="${MANPATH:-}"
              export RUSTUP_USE_CURL=1
              export CARGO_HOME=/tmp/cargo-home
              export RUSTUP_HOME=/tmp/rustup-home
              export CARGO_TARGET_DIR=/tmp/cargo-target

              if [ -f /opt/rh/devtoolset-10/enable ]; then
                source /opt/rh/devtoolset-10/enable
              fi

              yum install -y pam-devel curl >/tmp/yum.log
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable >/tmp/rustup.log
              source "${CARGO_HOME}/env"

              cargo build --release --locked

              install -D -m 0755 "${CARGO_TARGET_DIR}/release/${LIB_NAME}" "/work/${DIST_DIR}/${ASSET_NAME}/${RELEASE_LIB_NAME}"
              readelf --version-info "${CARGO_TARGET_DIR}/release/${LIB_NAME}" >"/work/${DIST_DIR}/${ASSET_NAME}/glibc-version-info.txt"

              tar -C "/work/${DIST_DIR}" -czf "/work/${DIST_DIR}/${ASSET_NAME}.tar.gz" "${ASSET_NAME}"
              sha256sum "/work/${DIST_DIR}/${ASSET_NAME}.tar.gz" >"/work/${DIST_DIR}/${ASSET_NAME}.tar.gz.sha256"

              chown -R "${HOST_UID}:${HOST_GID}" "/work/${DIST_DIR}"
            '

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}.tar.gz
            dist/${{ matrix.asset_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --verify-tag \
              --generate-notes
          fi

          gh release upload "${TAG_NAME}" release-assets/* --clobber
